<html>
<head>
  <title>Ejemplo de JavaScript</title>
  <meta charset="UTF-8">
</head>
<body>

<script>
   
    var notas = [3, 4, 5, 6, 5, 7, 8, 3, 9];
    
    var contadorAprobados = 0;
    var sumatorioAprobados = 0;

    function CalcularEstadisticas() {
        
        for (var i = 0; i < notas.length; i++) {
            
       
            if (notas[i] >= 5) {
                contadorAprobados++; 
                sumatorioAprobados += notas[i];
            }
        }

        var mediaAprobados = 0;
        if (contadorAprobados > 0) {
            mediaAprobados = sumatorioAprobados / contadorAprobados;
        }

        document.write("Aprobados: " + contadorAprobados + "<br>");
        document.write("Suma de aprobados: " + sumatorioAprobados + "<br>");
        document.write("Media aprobados: " + mediaAprobados);
    }

    CalcularEstadisticas();
</script>

</body>
</html>
